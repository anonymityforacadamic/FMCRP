apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fmcrp-target
  namespace: fmcrp
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
    spec:
      containers:
        - image: fmcrp-target:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
